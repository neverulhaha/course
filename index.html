
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Версиум — AI Course Platform</title>
      <!-- Prevent FOUC: apply theme before React renders -->
      <script>
        (function () {
          try {
            var s = localStorage.getItem('vs-theme');
            var p = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', s === 'dark' || s === 'light' ? s : p ? 'dark' : 'light');
          } catch (_) {}
        })();
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
